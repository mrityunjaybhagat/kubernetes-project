name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/k8s-app:2.0 ./app
        
      - name: Tag latest
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/k8s-app:2.0 ${{ secrets.DOCKER_USERNAME }}/k8s-app:latest
          
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/k8s-app:2.0
          docker push ${{ secrets.DOCKER_USERNAME }}/k8s-app:latest

      - name: Load image into kind
        run: |
          kind load docker-image ${{ secrets.DOCKER_USERNAME }}/k8s-app:latest --name staging
          kind load docker-image ${{ secrets.DOCKER_USERNAME }}/k8s-app:2.0 --name production

      - name: Deploy to staging
        run: |
          kubectl config use-context staging
          kubectl apply -f staging/deployment.yaml